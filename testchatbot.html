<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Test Chatbot Zapier</title>
</head>

<style>
    .chatbot-float {
        position: fixed;
        right: 24px;
        bottom: 24px;
        background: #2563eb;
        color: #ffffff;
        padding: 15px 22px;
        border-radius: 999px;
        text-decoration: none;
        font-family: Arial, sans-serif;
        font-weight: 700;
        font-size: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        z-index: 9999;
        transition: all 0.3s ease;
    }

    .chatbot-float:hover {
        background: #1d4ed8;
        transform: translateY(-3px);
    }
</style>

<body>

    <h1>Prueba del chatbot</h1>

    <!-- Botón flotante para abrir chatbot -->
    <a href="https://academia-digital.zapier.app/" target="_blank" class="chatbot-float">
        💬 Hablar con el asistente
    </a>
    <script async type="module"
        src="https://interfaces.zapier.com/assets/web-components/zapier-interfaces/zapier-interfaces.esm.js"></script>
    <zapier-interfaces-chatbot-embed is-popup="true"
        chatbot-id="cmpfg3l9p005itzmuhes6souw"></zapier-interfaces-chatbot-embed>
</body>

</html>
